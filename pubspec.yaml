name: aguahoy
description: "AguaHoy - Track your daily water intake with a home screen widget"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Persistence
  shared_preferences: ^2.3.4
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.0

  # Widget
  home_widget: ^0.7.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Ads
  google_mobile_ads: ^5.3.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # UI
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_ce_generator: ^1.7.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
